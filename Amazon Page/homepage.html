<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon homepage (fake)</title>
    <link rel="stylesheet" href="/css/reset.css" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header>
      <div id="top-logo"><img src="/images/logo.png" alt="Amazon logo" /></div>
      <nav class="in-line">
        <p class="inline">All</p>
        <p class="inline">Today's deals</p>
        <p class="inline">Customer Service</p>
        <p class="inline">Registry</p>
        <p class="inline">Gift Cards</p>
        <p class="inline">Sell</p>
      </nav>
    </header>

    <main>
      <p id="shop-all">Shop All Holiday Gift Cards</p>
      <div id="gift-guides">
        <h1>Holiday Gift Guides</h1>
        <h3>Be a go-gifter</h3>
      </div>
      <section>
        <div class="inline">
          <p>Find the perfect gift</p>
          <p class="colored-text">Shop now</p>
        </div>
        <img class="a" src="/images/img_1.jpg" alt="e-reader" />
        <img class="a" src="/images/img_2.jpg" alt="laptop on desk" />
        <img class="a" src="/images/img_3.jpg" alt="smartwatches" />
        <img class="a" src="/images/img_4.jpg" alt="dog and cat" />
      </section>
      <div class="inline">
        <img class="b" src="/images/img_9.png" alt="" />
        <p>Play the gifting game</p>
        <p class="colored-text">Shop gaming</p>
      </div>
      <div class="inline">
        <img class="b" src="/images/img_10.png" alt="" />
        <p>The sound of cheer</p>
        <p class="colored-text">Shop Audio &amp; Accessories</p>
      </div>
    </main>

    <footer>
      <a href="#top-logo"></a>
      <img id="bottom-logo" src="/images/logo.png" alt="Amazon logo" />
    </footer>
  </body>
</html>
